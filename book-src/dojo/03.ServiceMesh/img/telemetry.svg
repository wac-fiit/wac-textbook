<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 560" font-family="Segoe UI, Arial, sans-serif" font-size="13">
  <!-- Background -->
  <rect width="900" height="560" fill="#f8f9fa" rx="12"/>

  <!-- Kubernetes cluster boundary -->
  <rect x="20" y="20" width="860" height="520" rx="16" fill="none" stroke="#326ce5" stroke-width="2.5" stroke-dasharray="10,5"/>
  <text x="40" y="44" fill="#326ce5" font-size="14" font-weight="bold">Kubernetes Cluster</text>
  <!-- k8s logo placeholder -->
  <circle cx="855" cy="35" r="12" fill="#326ce5"/>
  <text x="855" y="40" text-anchor="middle" fill="white" font-size="11" font-weight="bold">k8s</text>

  <!-- ── Microservices namespace box ── -->
  <rect x="40" y="60" width="240" height="200" rx="10" fill="#e8f0fe" stroke="#4a90d9" stroke-width="1.5" stroke-dasharray="6,3"/>
  <text x="160" y="80" text-anchor="middle" fill="#4a90d9" font-size="12" font-weight="bold">Mikroslužby (Pody)</text>

  <!-- Service boxes inside namespace -->
  <!-- ambulance-webapi -->
  <rect x="60" y="90" width="200" height="54" rx="8" fill="#ffffff" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="160" y="111" text-anchor="middle" fill="#333" font-weight="bold" font-size="12">ambulance-webapi</text>
  <text x="160" y="128" text-anchor="middle" fill="#666" font-size="10">OTLP SDK (zerolog)</text>
  <text x="160" y="141" text-anchor="middle" fill="#888" font-size="9">traces · logs · metrics</text>

  <!-- ambulance-ufe -->
  <rect x="60" y="154" width="200" height="54" rx="8" fill="#ffffff" stroke="#4a90d9" stroke-width="1.2"/>
  <text x="160" y="175" text-anchor="middle" fill="#333" font-weight="bold" font-size="12">ambulance-ufe</text>
  <text x="160" y="192" text-anchor="middle" fill="#666" font-size="10">OTLP SDK</text>
  <text x="160" y="205" text-anchor="middle" fill="#888" font-size="9">traces · logs · metrics</text>

  <!-- other services -->
  <rect x="60" y="218" width="200" height="30" rx="8" fill="#ffffff" stroke="#aaa" stroke-width="1" stroke-dasharray="4,3"/>
  <text x="160" y="238" text-anchor="middle" fill="#999" font-size="11" font-style="italic">ďalšie mikroslužby …</text>

  <!-- ── OTel Collector ── -->
  <rect x="350" y="195" width="200" height="120" rx="12" fill="#fff3e0" stroke="#f57c00" stroke-width="2"/>
  <text x="450" y="222" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">OpenTelemetry</text>
  <text x="450" y="238" text-anchor="middle" fill="#e65100" font-size="13" font-weight="bold">Collector</text>
  <text x="450" y="258" text-anchor="middle" fill="#795548" font-size="10">Receivers: OTLP (gRPC/HTTP)</text>
  <text x="450" y="272" text-anchor="middle" fill="#795548" font-size="10">Processors: batch, memory_limiter</text>
  <text x="450" y="286" text-anchor="middle" fill="#795548" font-size="10">Exporters: loki · jaeger · prometheus</text>
  <!-- DaemonSet label -->
  <rect x="390" y="300" width="120" height="20" rx="4" fill="#f57c00" opacity="0.15"/>
  <text x="450" y="314" text-anchor="middle" fill="#e65100" font-size="10">DaemonSet / Deployment</text>

  <!-- ── Backends ── -->
  <!-- Victoria Logs -->
  <rect x="660" y="80" width="190" height="80" rx="10" fill="#e8f5e9" stroke="#388e3c" stroke-width="2"/>
  <text x="755" y="110" text-anchor="middle" fill="#1b5e20" font-size="13" font-weight="bold">Victoria Logs</text>
  <text x="755" y="128" text-anchor="middle" fill="#4caf50" font-size="10">Loki-compatible endpoint</text>
  <text x="755" y="143" text-anchor="middle" fill="#666" font-size="10">Zber a vyhľadávanie logov</text>

  <!-- Jaeger v2 -->
  <rect x="660" y="215" width="190" height="80" rx="10" fill="#e3f2fd" stroke="#1976d2" stroke-width="2"/>
  <text x="755" y="245" text-anchor="middle" fill="#0d47a1" font-size="13" font-weight="bold">Jaeger v2</text>
  <text x="755" y="263" text-anchor="middle" fill="#1976d2" font-size="10">OTLP / gRPC endpoint</text>
  <text x="755" y="278" text-anchor="middle" fill="#666" font-size="10">Distribuované trasovanie</text>

  <!-- Victoria Metrics -->
  <rect x="660" y="350" width="190" height="80" rx="10" fill="#fce4ec" stroke="#c62828" stroke-width="2"/>
  <text x="755" y="380" text-anchor="middle" fill="#b71c1c" font-size="13" font-weight="bold">Victoria Metrics</text>
  <text x="755" y="398" text-anchor="middle" fill="#e53935" font-size="10">Prometheus-compatible</text>
  <text x="755" y="413" text-anchor="middle" fill="#666" font-size="10">Metriky výkonu systému</text>

  <!-- ── Arrows: microservices → OTel Collector ── -->
  <!-- from ambulance-webapi -->
  <line x1="260" y1="117" x2="348" y2="230" stroke="#4a90d9" stroke-width="1.8" marker-end="url(#arrow-blue)"/>
  <!-- from ambulance-ufe -->
  <line x1="260" y1="181" x2="348" y2="245" stroke="#4a90d9" stroke-width="1.8" marker-end="url(#arrow-blue)"/>

  <!-- OTLP label on arrows -->
  <text x="295" y="185" fill="#4a90d9" font-size="10" transform="rotate(-27, 295, 185)">OTLP gRPC/HTTP</text>

  <!-- ── Arrows: OTel Collector → Backends ── -->
  <!-- → Victoria Logs (logs) -->
  <line x1="550" y1="230" x2="658" y2="138" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="590" y="185" fill="#388e3c" font-size="10" transform="rotate(-30, 590, 185)">Logs (Loki API)</text>

  <!-- → Jaeger v2 (traces) -->
  <line x1="550" y1="255" x2="658" y2="255" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <text x="572" y="248" fill="#1976d2" font-size="10">Traces (OTLP)</text>

  <!-- → Victoria Metrics (metrics) -->
  <line x1="550" y1="280" x2="658" y2="378" stroke="#c62828" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="565" y="340" fill="#c62828" font-size="10" transform="rotate(35, 565, 340)">Metrics (Prometheus)</text>

  <!-- ── Legend ── -->
  <rect x="40" y="460" width="820" height="78" rx="8" fill="#fff" stroke="#ccc" stroke-width="1"/>
  <text x="60" y="480" fill="#333" font-size="11" font-weight="bold">Legenda</text>

  <line x1="60" y1="498" x2="100" y2="498" stroke="#4a90d9" stroke-width="2" marker-end="url(#arrow-blue)"/>
  <text x="108" y="502" fill="#333" font-size="10">OTLP – prenos telemetrických udalostí (logy, traces, metriky) zo SDK do Collectora</text>

  <line x1="60" y1="520" x2="100" y2="520" stroke="#388e3c" stroke-width="2" marker-end="url(#arrow-green)"/>
  <text x="108" y="524" fill="#333" font-size="10">Logy → Victoria Logs</text>

  <line x1="270" y1="520" x2="310" y2="520" stroke="#1976d2" stroke-width="2" marker-end="url(#arrow-navy)"/>
  <text x="318" y="524" fill="#333" font-size="10">Traces → Jaeger v2</text>

  <line x1="470" y1="520" x2="510" y2="520" stroke="#c62828" stroke-width="2" marker-end="url(#arrow-red)"/>
  <text x="518" y="524" fill="#333" font-size="10">Metriky → Victoria Metrics</text>

  <!-- ── Arrow markers ── -->
  <defs>
    <marker id="arrow-blue" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#4a90d9"/>
    </marker>
    <marker id="arrow-green" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#388e3c"/>
    </marker>
    <marker id="arrow-navy" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#1976d2"/>
    </marker>
    <marker id="arrow-red" markerWidth="8" markerHeight="8" refX="6" refY="3" orient="auto">
      <path d="M0,0 L0,6 L8,3 z" fill="#c62828"/>
    </marker>
  </defs>
</svg>
